<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Organ Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Organ Exchange System</h1>
            <ul class="nav-links">
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/my-inventory.html">My Inventory</a></li>
                <li><a href="/search-organs.html">Search Organs</a></li>
                <li><a href="/outgoing-requests.html">Outgoing Requests</a></li>
                <li><a href="/incoming-requests.html">Incoming Requests</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2>Welcome, <span id="hospitalName"></span></h2>
        
        <div class="dashboard-stats">
            <div class="stat-card">
                <h3>My Inventory</h3>
                <p id="inventoryCount">Loading...</p>
                <a href="/my-inventory.html" class="btn btn-small">Manage</a>
            </div>
            
            <div class="stat-card">
                <h3>Outgoing Requests</h3>
                <p id="outgoingCount">Loading...</p>
                <a href="/outgoing-requests.html" class="btn btn-small">View</a>
            </div>
            
            <div class="stat-card">
                <h3>Incoming Requests</h3>
                <p id="incomingCount">Loading...</p>
                <a href="/incoming-requests.html" class="btn btn-small">View</a>
            </div>
        </div>

        <div class="quick-actions">
            <h3>Quick Actions</h3>
            <div class="action-buttons">
                <a href="/my-inventory.html" class="btn btn-primary">Add/Update Inventory</a>
                <a href="/search-organs.html" class="btn btn-secondary">Search for Organs</a>
            </div>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
