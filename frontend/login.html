<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MED-SYNC Organ Exchange</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">MED-SYNC</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Hospital Login</a></li>
                <li><a href="/register.html">Join Network</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 2rem;">Hospital Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Institutional Email</label>
                    <input type="email" id="email" name="email" placeholder="email@hospital.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div id="errorMessage" class="error-message"
                    style="display: none; padding: 1rem; margin-bottom: 1.5rem; text-align: center;"></div>

                <button type="submit" class="btn btn-action"
                    style="width: 100%; padding: 1rem; border-radius: var(--border-radius);">Secure Login</button>
            </form>
            <p class="text-center" style="margin-top: 2rem; font-size: 0.9rem;">
                New to MED-SYNC? <a href="/register.html"
                    style="color: var(--secondary-color); font-weight: 600;">Register your institution</a>
            </p>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>

</html>
