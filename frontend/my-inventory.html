<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Inventory - Organ Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Organ Exchange System</h1>
            <ul class="nav-links">
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/my-inventory.html">My Inventory</a></li>
                <li><a href="/search-organs.html">Search Organs</a></li>
                <li><a href="/outgoing-requests.html">Outgoing Requests</a></li>
                <li><a href="/incoming-requests.html">Incoming Requests</a></li>
                <li><a href="#" id="logoutBtn">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <h2>My Organ Inventory</h2>
        
        <div class="inventory-form">
            <h3>Add/Update Organ</h3>
            <form id="inventoryForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="organ_type">Organ Type *</label>
                        <select id="organ_type" name="organ_type" required>
                            <option value="">Select Organ</option>
                            <option value="Heart">Heart</option>
                            <option value="Kidney">Kidney</option>
                            <option value="Liver">Liver</option>
                            <option value="Lungs">Lungs</option>
                            <option value="Pancreas">Pancreas</option>
                            <option value="Eye/Cornea">Eye/Cornea</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="blood_group">Blood Group *</label>
                        <select id="blood_group" name="blood_group" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="available_units">Available Units *</label>
                        <input type="number" id="available_units" name="available_units" min="0" required>
                    </div>

                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" name="status" required>
                            <option value="AVAILABLE">Available</option>
                            <option value="NOT_AVAILABLE">Not Available</option>
                        </select>
                    </div>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary">Save Inventory</button>
            </form>
        </div>

        <div class="inventory-list">
            <h3>Current Inventory</h3>
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>Organ Type</th>
                        <th>Blood Group</th>
                        <th>Available Units</th>
                        <th>Status</th>
                        <th>Last Updated</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    <tr>
                        <td colspan="6" class="text-center">Loading inventory...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/inventory.js"></script>
</body>
</html>
