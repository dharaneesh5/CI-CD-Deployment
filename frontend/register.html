<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Hospital - Organ Exchange</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">Organ Exchange System</h1>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login.html">Login</a></li>
                <li><a href="/register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="form-container">
            <h2>Hospital Registration</h2>
            <form id="registerForm">
                <div class="form-section">
                    <h3>Hospital Information</h3>
                    
                    <div class="form-group">
                        <label for="name">Hospital Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="license_no">License/Registration Number *</label>
                        <input type="text" id="license_no" name="license_no" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>
                        <small>10 digit mobile number</small>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Address Information</h3>
                    
                    <div class="form-group">
                        <label for="address">Street Address *</label>
                        <textarea id="address" name="address" rows="2" required></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" name="city" required>
                        </div>

                        <div class="form-group">
                            <label for="district">District *</label>
                            <input type="text" id="district" name="district" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="state">State *</label>
                            <input type="text" id="state" name="state" required>
                        </div>

                        <div class="form-group">
                            <label for="pincode">Pincode *</label>
                            <input type="text" id="pincode" name="pincode" pattern="[0-9]{6}" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Contact Person Details</h3>
                    
                    <div class="form-group">
                        <label for="contact_person_name">Contact Person Name *</label>
                        <input type="text" id="contact_person_name" name="contact_person_name" required>
                    </div>

                    <div class="form-group">
                        <label for="contact_person_phone">Contact Person Phone *</label>
                        <input type="tel" id="contact_person_phone" name="contact_person_phone" pattern="[0-9]{10}" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Security</h3>
                    
                    <div class="form-group">
                        <label for="password">Password *</label>
                        <input type="password" id="password" name="password" minlength="8" required>
                        <small>Minimum 8 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">Confirm Password *</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block">Register Hospital</button>
            </form>
            <p class="text-center">Already registered? <a href="/login.html">Login here</a></p>
        </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
